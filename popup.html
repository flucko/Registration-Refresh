<!DOCTYPE html>
<html>
<head>
    <title>Registration Refresh</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Tab Auto Refresher</h2>
        
        <div id="statusIndicator" class="status inactive">
            <span class="dot"></span>
            <span class="text">Not Active</span>
        </div>
        
        <div class="time-inputs">
            <div class="input-group">
                <label>Hour</label>
                <input type="number" id="hour" min="0" max="23" placeholder="HH">
            </div>
            <div class="input-group">
                <label>Min</label>
                <input type="number" id="minute" min="0" max="59" placeholder="MM">
            </div>
            <div class="input-group">
                <label>Sec</label>
                <input type="number" id="second" min="0" max="59" placeholder="SS">
            </div>
        </div>

        <p id="countdown" class="countdown hidden"></p>

        <div class="buttons">
            <button id="startBtn" class="primary">Start</button>
            <button id="cancelBtn" class="danger hidden">Cancel</button>
            <button id="testBtn" class="secondary">Test (+20s)</button>
        </div>
        
    </div>
    <script src="popup.js"></script>
</body>
</html>
